<app-navbar></app-navbar>

<div class="dashboard-content">
    <div class="projects-section">
        <div class="project-create">
            <button (click)="createProject()">(+) project</button>
        </div>
         <app-project-component *ngFor="let project of projects" [projectId]="project._id" [projectName]="project.projectName"></app-project-component>
    </div>
    <div class="tasks-section">
        <div class="recent-tasks">
            <h3>Recent Tasks</h3>
            <app-task></app-task>
        </div>
    </div>
</div>
