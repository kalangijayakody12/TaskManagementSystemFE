<p-card styleClass="task-card shadow-2 border-round-xl mb-3">

  <div class="flex flex-column gap-2">

    <div class="text-sm text-500">
      Task ID
    </div>
    <div class="font-semibold">
      {{taskDetails.taskId}}
    </div>

    <div class="text-sm text-500 mt-2">
      Task Name
    </div>
    <div class="font-semibold">
      {{taskDetails.taskName}}
    </div>

    <div class="mt-3 flex flex-column gap-2">
      <span class="text-sm text-500">Task Status</span>

      <p-select
        [options]="statusOptions"
        [(ngModel)]="taskDetails.taskStatus"
        placeholder="Select Status"
        styleClass="w-full">
      </p-select>
    </div>

    <div class="mt-3 flex flex-column gap-2">
      <span class="text-sm text-500">Assigned Members</span>

      <div class="font-semibold" *ngFor="let member of this.assignedMemberNames">
            {{member.userName}}
      </div>

      <p-multiSelect
        [options]="memberOptions"
        [(ngModel)]="taskDetails.taskAssignedMembers"
        optionLabel="label"
        optionValue="value"
        placeholder="Select Members"
        display="chip"
        styleClass="w-full">
      </p-multiSelect>
    </div>

    <div class="mt-4 flex justify-content-end">
    <button
        pButton
        type="button"
        label="Update Task"
        icon="pi pi-save"
        (click)="updateTask()">
    </button>
</div>

  </div>

</p-card>
