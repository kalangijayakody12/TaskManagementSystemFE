<p-card styleClass="task-card">

  <div class="flex flex-column gap-2">

    <div class="info-block">
      <div class="section-label">Task ID</div>
      <div class="section-value">{{taskDetails.taskId}}</div>
    </div>

     <div class="info-block">
      <div class="section-label">Task Name</div>
      <div class="section-value">{{taskDetails.taskName}}</div>
    </div>

    <div>
       <span class="text-sm text-500">Task Status History</span>

       <table class="history-table">
        <thead>
            <tr>
                <th>Task Status</th>
                <th>Updated By</th>
                <th>Updated On</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let status of this.taskDetails.taskActivityHistory">
                <td>{{status.status}}</td>
                <td>{{status.changedBy.userName}}</td>
                <td>{{status.changedAt | date:'yyyy-MM-dd'}}</td>
            </tr>
        </tbody>
       </table>
    </div>

    <div class="mt-3 flex flex-column gap-2">
      <span class="text-sm text-500">Task Status</span>

      <p-select
        [options]="statusOptions"
        [(ngModel)]="taskDetails.taskStatus"
        placeholder="Select Status"
        styleClass="w-full">
      </p-select>
    </div>

    <div class="mt-3 flex flex-column gap-2">
      <span class="text-sm text-500">Assigned Members</span>

        <div class="member-list">
        <div
          class="member-chip"
          *ngFor="let member of assignedMemberNames">
          {{ member.userName }}
        </div>
      </div>

      <p-multiSelect
        [options]="memberOptions"
        [(ngModel)]="taskDetails.taskAssignedMembers"
        optionLabel="label"
        optionValue="value"
        placeholder="Select Members"
        display="chip"
        styleClass="w-full">
      </p-multiSelect>
    </div>

    <button
      pButton
      type="button"
      label="Update Task"
      icon="pi pi-save"
      class="update-btn"
      (click)="updateTask()">
    </button>

  </div>

</p-card>
