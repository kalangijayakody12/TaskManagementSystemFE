<div class="task-popup-container">

  <h2>New Task</h2>
  <div class="task-form" >
    <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
        <label for="name">Name:</label>
        <input id="name" name="name" type="text" formControlName="name">
    
        <label for="startDate">Start Date:</label>
        <input id="startDate" name="startDate" type="date" formControlName="startDate">
    
        <label for="endDate">End Date:</label>
        <input id="endDate" name="endDate" type="date" formControlName="endDate">
    
        <label for="owner">Owner:</label>
        <input id="owner" name="owner" type="text" formControlName="owner">
    
        <button type="submit">Create Task</button>
    
    </form>
  </div>

</div>
