<app-navbar ></app-navbar>

<div class="grid p-3 surface-100">   
    <div class="col-12">
        <p-card>
            <ng-template #title>{{projectData?.projectName}}</ng-template>
            <ng-template #subtitle>{{projectData?.projectStatus}}</ng-template>

            <ng-template #content>
                <div class="flex justify-content-end" >
                    <p-button 
                        label="New Task" 
                        icon="pi pi-plus"
                        severity="success"
                        size="small"
                        (click)="createTask(projectId)">
                    </p-button>
                    <p-button 
                        label="Delete Project" 
                        icon="pi pi-trash"
                        severity="danger"
                        size="small"
                        (click)="deleteProject(projectId)">
                    </p-button>
                </div>
                
                <app-task [projectId]="projectId"></app-task>

            </ng-template>
        </p-card>
    </div>
</div>
