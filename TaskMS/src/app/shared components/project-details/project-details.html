<app-navbar></app-navbar>

<div class="project-details">   
    <div class="project-details-header" *ngIf="projectData">
         <h3>{{projectData?.projectName}}</h3>
         <h4>Status: {{projectData?.projectStatus}}</h4>
           
    </div>

    <div class="project-details-content">
        <div class="task-create">
            <button (click)="createTask(projectId)">(+) task</button>
        </div>
        <div class="project-tasks">
            <app-task [projectId]="projectId"></app-task>
        </div>

    </div>
</div>
