<div class="table-container">

    <table class="task-table">

        <thead>
            <tr>
                <th>TaskId</th>
                <th>Name</th>
                <th>StartDate</th>
                <th>EndDate</th>
                <th>Status</th>
                <th>---</th>
            </tr>
        </thead>

        <tbody>
             <tr *ngIf="taskData.length === 0">
                <td colspan="6" style="text-align:center;">
                No tasks available
                </td>
            </tr>

            <tr *ngFor="let d of taskData">  
                <td  (click)="onTaskClick(d._id)">{{ d.taskId }}</td>
                <td  (click)="onTaskClick(d._id)">{{ d.taskName }}</td>
                <td  (click)="onTaskClick(d._id)">{{ d.taskStartDate | date:'yyyy-MM-dd'}}</td>
                <td  (click)="onTaskClick(d._id)">{{ d.taskDueDate | date:'yyyy-MM-dd'}}</td>
                <td  (click)="onTaskClick(d._id)">{{ d.taskStatus }}</td>
                <td>
                    <p-button
                        icon="pi pi-trash"
                        severity="danger"
                        (click)="onDeleteClick(d._id)"
                    ></p-button>
                </td>
            </tr>

        </tbody>

    </table>

</div>
